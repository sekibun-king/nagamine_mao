<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>取得単位（スプレッドシート連携版）</title>
<style>
:root{--brand:#e60033;--ink:#222;--muted:#666;--line:#e8e8e8;--bg:#f6f7f8;--card:#fff;--shadow:0 4px 14px rgba(0,0,0,.06)}
*{box-sizing:border-box}html,body{margin:0}body{background:var(--bg);color:var(--ink);font:14px/1.65 system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif}
a{color:inherit;text-decoration:none}.container{max-width:1200px;margin:0 auto;padding:0 14px}
header.site{
  position:sticky;
  top:0;
  z-index:60;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.header-inner{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 0;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  color:var(--brand);
  white-space:nowrap;
}
.logo-mark{
  width:24px;
  height:24px;
  border-radius:6px;
  background:linear-gradient(135deg,#ff4a6e,var(--brand));
}
.actions{
  margin-left:auto;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.btn{
  height:34px;
  padding:0 12px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
}
.search{flex:1;display:flex;gap:8px;min-width:260px}.search input{flex:1;height:42px;border:1px solid var(--line);border-radius:999px;padding:0 14px}
.search .btn-search{height:42px;border-radius:999px;border:0;background:var(--brand);color:#fff;padding:0 16px;cursor:pointer}
.search .btn-clear{height:42px;border-radius:999px;border:1px solid var(--line);background:#fff;padding:0 16px;cursor:pointer}

.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
nav.primary{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.navwrap{display:flex;gap:8px;overflow:auto;padding:8px 0}.chip{white-space:nowrap;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#fff}
.chip.active{background:var(--brand);border-color:var(--brand);color:#fff}
main.container{margin:16px auto}.layout{display:grid;grid-template-columns:1fr;gap:16px}
section{margin:24px 0}section h3{margin:0 0 10px;font-size:1.05rem}
.tools{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;align-items:center}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:var(--shadow)}
table{border-collapse:separate;border-spacing:0;width:100%;min-width:780px;background:#fff;table-layout:fixed}
th,td{padding:10px;border-bottom:1px solid var(--line)} thead th{position:sticky;top:0;background:#fafafa;text-align:left}
tbody tr:hover{background:#fcfcfc}
table td:nth-child(2),table th:nth-child(2){white-space:normal;overflow-wrap:anywhere;word-break:break-word}
.note-text{white-space:pre-line}
.footer-links{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 0}
.footer-links a{color:#444;text-decoration:none;padding:4px 6px;border-radius:8px}
.footer-links a:hover{background:rgba(0,0,0,.05)}
.footer-links .sep{color:#bbb}
footer{margin-top:26px;background:#fff;border-top:1px solid var(--line)}.copyright{border-top:1px solid var(--line);color:#777;padding:12px 0;font-size:.88rem}
.status{color:#666;margin:8px 0}.status.error{color:#b00020}.status.ok{color:#0b7}
code.inline{background:#fff;border:1px solid var(--line);padding:2px 6px;border-radius:6px}
.small{font-size:.92rem;color:#666}

.btn.disabled{
  background:#d9d9d9;
  border-color:#d9d9d9;
  color:#777;
  cursor:not-allowed;
  pointer-events:none;
}

@media (max-width: 780px){
  .header-inner{
    flex-wrap:wrap;
    align-items:stretch;
    gap:10px;
  }

  .logo{
    width:100%;
  }

  .search{
    order:2;
    width:100%;
    min-width:0;
    flex-wrap:wrap;
  }

  .search input{
    min-width:0;
    width:100%;
  }

  .search .btn-search,
  .search .btn-clear{
    flex:1 1 calc(50% - 4px);
  }

  .actions{
    order:3;
    width:100%;
    margin-left:0;
    justify-content:flex-start;
    flex-wrap:nowrap;
    overflow-x:auto;
    padding-bottom:4px;
    scrollbar-width:none;
  }

  .actions::-webkit-scrollbar{
    display:none;
  }

  .actions .btn{
    flex:0 0 auto;
  }

  .table-wrap{
    overflow:visible;
    border:0;
    background:transparent;
    box-shadow:none;
  }

  table{
    min-width:0;
    border-spacing:0;
    table-layout:auto;
  }

  colgroup,
  thead,
  tfoot{
    display:none;
  }

  tbody{
    display:grid;
    gap:10px;
  }

  tbody tr{
    display:block;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:var(--shadow);
    padding:10px 12px;
  }

  tbody td{
    display:block;
    border-bottom:0;
    padding:2px 0;
    white-space:normal;
  }

  tbody td:nth-child(1)::before{content:"年度："; font-weight:700;}
  tbody td:nth-child(2)::before{content:"区分："; font-weight:700;}
  tbody td:nth-child(3)::before{content:"授業名："; font-weight:700;}
  tbody td:nth-child(4)::before{content:"単位："; font-weight:700;}
  tbody td:nth-child(5)::before{content:"成績："; font-weight:700;}
  tbody td:nth-child(6)::before{content:"備考："; font-weight:700;}
}
</style>
</head><body>
<header class="site">
  <div class="container header-inner">
    <a class="logo" href="index.html"><span class="logo-mark"></span><span>長峰実央</span></a>
    <form class="search" onsubmit="event.preventDefault(); doSearch()">
      <input id="q" placeholder="検索（科目名／年度／学期／備考 など）" aria-label="検索">
      <button type="submit" class="btn-search">検索</button>
      <button type="button" class="btn-clear" onclick="clearSearch()">クリア</button>
    </form>
    <div class="actions">
      <a class="btn" href="history.html">履歴</a>
      <a class="btn primary" href="units.html">取得単位</a>
      <a class="btn" href="lecture.html">講義情報</a>
      <a class="btn disabled" href="javascript:void(0)" aria-disabled="true">Coming Soon</a>
      <a class="btn disabled" href="javascript:void(0)" aria-disabled="true">Coming Soon</a>
      <a class="btn" href="links.html">リンク集</a>
    </div>
</header>

<main class="container">
  <div class="layout">
    <div>
      <section>
        <h3>取得済み単位一覧</h3>
        <div class="table-wrap">
          <table>
            <colgroup>
              <col style="width:72px">
              <col style="width:100px">
              <col>
              <col style="width:72px">
              <col style="width:72px">
              <col style="width:240px">
            </colgroup>
            <thead><tr><th>年度</th><th>区分</th><th>授業名</th><th>単位</th><th>成績</th><th>備考</th></tr></thead>
            <tbody id="tbody"></tbody>
            <tfoot><tr><th colspan="3" style="text-align:right">合計</th><th id="total">—</th><th colspan="2"></th></tr></tfoot>
          </table>
        </div>
      </section>
    </div>
  </div>
</main>

<footer>
  <div class="container footer-links" id="footer-links"></div>
  <div class="container copyright">© 2025 Mao Nagamine</div>
</footer>

<script>
// ===== ここを自分のURLに差し替え =====
// 例: https://sheet.best/api/sheets/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1uV2Rdpa86KHv92NxBBcDZY1UI0V8dScUHtMbWanX2ks/export?format=csv&gid=764664318";

let UNITS_ROWS = [];

function escapeHTML(s){
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function normalizeRow(row){
  return {
    year: String(row.year ?? '').trim(),
    kind: String(row.kind ?? '').trim(),
    name: String(row.name ?? '').trim(),
    credits: String(row.credits ?? '').trim(),
    grade: String(row.grade ?? '').trim(),
    note: String(row.note ?? '').trim(),
  };
}

function sortRows(rows){
  const termOrder = { '既修得認定':0, '既習得認定':0, '前期':1, '前期（学部）':2, '後期':3, '後期（学部）':4 };
  const termRank = (s) => termOrder[s] ?? 999;
  return rows.slice().sort((a,b)=>{
    const ya = parseInt(a.year,10) || 0;
    const yb = parseInt(b.year,10) || 0;
    if (ya !== yb) return yb - ya;
    const ka = termRank(a.kind), kb = termRank(b.kind);
    if (ka !== kb) return ka - kb;
    return a.name.localeCompare(b.name, 'ja');
  });
}

function renderTable(rows){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(row => `
    <tr>
      <td data-label="年度">${escapeHTML(row.year)}</td>
      <td data-label="区分">${escapeHTML(row.kind)}</td>
      <td data-label="授業名">${escapeHTML(row.name)}</td>
      <td data-label="単位">${escapeHTML(row.credits)}</td>
      <td data-label="成績">${escapeHTML(row.grade)}</td>
      <td data-label="備考"><span class="note-text">${escapeHTML(row.note)}</span></td>
    </tr>
  `).join('');

  const total = rows.reduce((sum, row) => sum + (parseFloat(row.credits) || 0), 0);
  document.getElementById('total').textContent = total;
  updateUnitsCount();
}


function updateUnitsCount(){
  const rows = [...document.querySelectorAll('#tbody tr')];
  const visible = rows.filter(tr => tr.style.display !== 'none').length;
  const box = document.getElementById('units-count');
  if (box) box.textContent = `表示 ${visible} / 総 ${rows.length}`;
}

function applySearch(q){
  const rows = document.querySelectorAll('#tbody tr');
  let any = false;
  rows.forEach(tr => {
    const ok = !q || tr.textContent.toLowerCase().includes(q.toLowerCase());
    tr.style.display = ok ? '' : 'none';
    any = any || ok;
  });
  const msgId = 'search-empty';
  document.getElementById(msgId)?.remove();
  if (!any) {
    const d = document.createElement('div');
    d.id = msgId;
    d.className = 'status error';
    d.textContent = `「${q}」は見つかりませんでした`;
    document.querySelector('main section').prepend(d);
  }
  updateUnitsCount();
}

function doSearch(){
  const q = (document.getElementById('q')?.value || '').trim();
  sessionStorage.setItem('site_q', q);
  applySearch(q);
}

function clearSearch(){
  sessionStorage.removeItem('site_q');
  const i = document.getElementById('q');
  if (i) i.value = '';
  applySearch('');
}

async function loadUnitsFromSheet(showMessage = false){



  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/1uV2Rdpa86KHv92NxBBcDZY1UI0V8dScUHtMbWanX2ks/export?format=csv&gid=764664318", { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1).map(line=>{
      const [year,kind,name,credits,grade,note] = line.split(",");
      return {year,kind,name,credits,grade,note};
    });

    UNITS_ROWS = sortRows(rows);
    renderTable(UNITS_ROWS);

    const q = sessionStorage.getItem('site_q') || '';
    const input = document.getElementById('q');
    if (input) input.value = q;
    if (q) applySearch(q);

  
  } catch (err) {
    console.error(err);
    renderTable([]);
  }
}

function exportVisibleCSV(){
  const visibleRows = [...document.querySelectorAll('#tbody tr')].filter(tr => tr.style.display !== 'none');
  const lines = [['year','kind','name','credits','grade','note']];
  visibleRows.forEach(tr => {
    const cells = [...tr.children].map(td => td.innerText.replace(/\n/g, ' ').trim());
    lines.push(cells);
  });
  const csv = lines.map(row => row.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'units_export.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

const FOOTER_LINKS = [
  {label:'ホーム', href:'index.html'},
  {label:'履歴', href:'history.html'},
  {label:'取得単位', href:'units.html'},
  {label:'リンク集', href:'links.html'},
  {label:'お問い合わせ', href:'mailto:nagamine.mao.d9@elms.hokudai.ac.jp'}
];
function renderFooter(){
  const nav = document.getElementById('footer-links');
  if(!nav) return;
  nav.innerHTML = FOOTER_LINKS.map(l => `<a href="${l.href}">${l.label}</a>`).join('<span class="sep">｜</span>');
}

document.addEventListener('DOMContentLoaded', () => {
  renderFooter();
  loadUnitsFromSheet(false);
});
</script>
</body></html>
