<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>講義情報</title>
<style>
:root{
  --brand:#e60033; --brand-d:#cc002d;
  --ink:#222; --muted:#666; --line:#e8e8e8; --bg:#f6f7f8; --card:#fff;
  --gap:12px; --shadow:0 4px 14px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg);
  color:var(--ink);
  font:14px/1.65 system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%;height:auto}
.container{max-width:1200px;margin:0 auto;padding:0 14px}

/* ヘッダー */
header.site{
  position:sticky;
  top:0;
  z-index:60;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.header-inner{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 0;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  color:var(--brand);
  white-space:nowrap;
}
.logo-mark{
  width:24px;
  height:24px;
  border-radius:6px;
  background:linear-gradient(135deg,#ff4a6e,var(--brand));
}
.actions{
  margin-left:auto;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.btn{
  height:34px;
  padding:0 12px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
}
.search{
  flex:1;display:flex;gap:8px;align-items:center;
}
.search input{
  flex:1;height:42px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:0 14px;
  background:#fff;
  outline:none;
}
.search .btn-search{
  height:42px;border-radius:999px;border:0;
  background:var(--brand);color:#fff;
  padding:0 16px;cursor:pointer;
}
.search .btn-clear{
  height:42px;border-radius:999px;
  border:1px solid var(--line);
  background:#fff;padding:0 16px;cursor:pointer;
}

.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}

nav.primary{
  background:#fff;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.navwrap{
  display:flex;gap:8px;overflow:auto;
  padding:8px 0;scrollbar-width:none;
}
.navwrap::-webkit-scrollbar{display:none}
.chip{
  white-space:nowrap;
  padding:8px 12px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
}
.chip.active{
  background:var(--brand);
  border-color:var(--brand);
  color:#fff;
}

/* メイン */
main.container{margin:16px auto 24px}
.hero{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.hero h1{
  margin:0 0 6px;
  font-size:1.2rem;
  font-weight:900;
}
.hero p{
  margin:0;
  color:var(--muted);
}

.filters{
  margin:12px 0 14px;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
}
.filters select{
  height:38px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  padding:0 12px;
  font-size:.9rem;
}
.filters .count{
  margin-left:auto;
  color:var(--muted);
  font-size:.9rem;
}

.layout{
  display:grid;
  grid-template-columns:1fr 280px;
  gap:16px;
}
@media (max-width:1000px){
  .layout{grid-template-columns:1fr}
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}
@media (max-width:900px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:620px){
  .grid{grid-template-columns:1fr}
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.card-head{
  padding:12px 12px 8px;
  border-bottom:1px solid #f1f1f1;
}
.badges{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:8px;
}
.badge{
  display:inline-flex;align-items:center;
  height:24px;padding:0 9px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  font-size:.78rem;
  color:#444;
}
.badge.primary{
  color:#fff;background:var(--brand);border-color:var(--brand);
}
.card-title{
  margin:0;
  font-size:1rem;
  font-weight:800;
  line-height:1.4;
}
.card-meta{
  margin-top:6px;
  color:var(--muted);
  font-size:.88rem;
}
.card-body{
  padding:10px 12px 12px;
  display:flex;flex-direction:column;gap:8px;
}
.summary{
  color:#333;
  line-height:1.7;
  white-space:pre-line;
}

.grade-summary{
  color:var(--brand);
  background:#fff5f7;
  border:1px solid #ffd6df;
  border-radius:8px;
  padding:8px 10px;
  font-size:.88rem;
  line-height:1.6;
}

.grade-dist{
  display:grid;
  gap:6px;
  padding:8px 10px;
  background:#fff5f7;
  border:1px solid #ffd6df;
  border-radius:8px;
}

.grade-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  font-size:.88rem;
}

.grade-label{
  font-weight:700;
  color:var(--brand);
}

.grade-count{
  color:#444;
}


.meta-list{
  display:grid;
  gap:6px;
  font-size:.9rem;
}
.meta-row{
  display:grid;
  grid-template-columns:88px 1fr;
  gap:8px;
}
.meta-label{
  color:var(--muted);
}
.link-row{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-top:2px;
}
.link-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:34px;
  padding:0 12px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#fff;
  font-size:.88rem;
}
.link-btn.primary{
  background:var(--brand);
  border-color:var(--brand);
  color:#fff;
}
.note{
  color:#666;
  font-size:.86rem;
  white-space:pre-line;
  border-top:1px dashed var(--line);
  padding-top:8px;
}
.empty{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:var(--shadow);
  padding:18px;
  color:var(--muted);
}

/* 右サイド */
.aside{
  position:sticky;top:86px;
  height:fit-content;
}
.box{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px;
  box-shadow:var(--shadow);
}
.box h3{
  margin:0 0 10px;
  font-size:1rem;
}
.side-list{
  display:grid;gap:8px;
}
.side-item{
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px 10px;
  background:#fff;
}
.side-item .t{
  font-weight:700;
  line-height:1.4;
}
.side-item .s{
  color:var(--muted);
  font-size:.85rem;
  margin-top:2px;
}

/* フッター */
footer{
  margin-top:26px;
  background:#fff;
  border-top:1px solid var(--line);
}
.footer-links{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 0;
}
.footer-links a{
  color:#444;text-decoration:none;
  padding:4px 6px;border-radius:8px;
}
.footer-links a:hover{background:rgba(0,0,0,.05)}
.footer-links .sep{color:#bbb}
.copyright{
  border-top:1px solid var(--line);
  color:#777;padding:12px 0;
  font-size:.88rem;
}

.btn.disabled{
  background:#d9d9d9;
  border-color:#d9d9d9;
  color:#777;
  cursor:not-allowed;
  pointer-events:none;
}
</style>

      <span class="logo-mark"></span><span>長峰実央</span>

    <form class="search" onsubmit="event.preventDefault(); renderLectures()">

      <a class="btn primary" href="lecture.html">講義情報</a>
      <a class="btn disabled" href="javascript:void(0)" aria-disabled="true">Coming Soon</a>
      <a class="btn disabled" href="javascript:void(0)" aria-disabled="true">Coming Soon</a>
      <a class="btn" href="links.html">リンク集</a>
    </div>
  </div>

  
</header>

<main class="container">
  <div class="hero">

    <p>担当講義・演習・非常勤講義・TA/TF 等の情報を一覧で掲載しています。年度・学期・機関で絞り込みできます。</p>

<script>
/* =========================
   設定
========================= */

// GoogleスプレッドシートのCSV公開URLを入れる
// 例:
// https://docs.google.com/spreadsheets/d/xxxxxxxxxxxx/export?format=csv&gid=123456789
const LECTURE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vToeRTiUst366MSrFV6SkA24sdFmUBFouyl-DvC_abOZd9NCK_8xrA4doxcZjX_OdYYAF8MXPHFYsjH/pub?gid=310774291&single=true&output=csv";
const GRADE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vToeRTiUst366MSrFV6SkA24sdFmUBFouyl-DvC_abOZd9NCK_8xrA4doxcZjX_OdYYAF8MXPHFYsjH/pub?gid=172887479&single=true&output=csv";

let LECTURES = [];
let GRADE_ROWS = [];

/* =========================
   共通UI
========================= */
function setFooterLinks(){
  const el = document.getElementById('footer-links');
  if(!el) return;
  el.innerHTML = `
    <a href="index.html">ホーム</a><span class="sep">|</span>
    <a href="history.html">履歴</a><span class="sep">|</span>
    <a href="units.html">取得単位</a><span class="sep">|</span>
    <a href="lecture.html">講義情報</a><span class="sep">|</span>
    <a href="links.html">リンク集</a>
  `;
}

function escapeHtml(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function uniq(arr){
  return [...new Set(arr.filter(Boolean))];
}

function isTrue(v){
  return ["true","1","yes","公開"].includes(String(v || "").trim().toLowerCase());
}

function normalizeRow(row){
  return {
    id: (row.id || "").trim(),
    status: (row.status || "公開").trim(),
    sort: (row.sort || "").trim(),
    year: (row.year || "").trim(),
    term: (row.term || "").trim(),
    institution: (row.institution || "").trim(),
    faculty: (row.faculty || "").trim(),
    title: (row.title || "").trim(),
    subtitle: (row.subtitle || "").trim(),
    target: (row.target || "").trim(),
    category: (row.category || "").trim(),
    summary: (row.summary || "").trim(),
    syllabus_url: (row.syllabus_url || "").trim(),
    material_url: (row.material_url || "").trim(),
    grade_public: (row.grade_public || "").trim(),
    grade_summary: (row.grade_summary || "").trim(),
    min_public_size: (row.min_public_size || "").trim(),
    language: (row.language || "").trim(),
    format: (row.format || "").trim(),
    schedule: (row.schedule || "").trim(),
    room: (row.room || "").trim(),
    note: (row.note || "").trim(),
    updated: (row.updated || "").trim()
  };
}


function normalizeGradeRow(row){
  return {
    lecture_id: (row.lecture_id || "").trim(),
    sort: (row.sort || "").trim(),
    label: (row.label || "").trim(),
    count: (row.count || "").trim(),
    ratio: (row.ratio || "").trim(),
    note: (row.note || "").trim()
  };
}

async function loadGradeDistribution(){
  if(!GRADE_CSV_URL){
    GRADE_ROWS = [];
    return;
  }

  try{
    const res = await fetch(GRADE_CSV_URL, { cache:"no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    const rows = parseCSV(text);
    GRADE_ROWS = rows.map(normalizeGradeRow);
  }catch(err){
    console.error("成績分布CSVの読み込み失敗:", err);
    GRADE_ROWS = [];
  }
}

/* =========================
   CSV 読み込み
========================= */


function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let i = 0;
  let inQuotes = false;

  while(i < text.length){
    const ch = text[i];
    const next = text[i+1];

    if(inQuotes){
      if(ch === '"' && next === '"'){
        cell += '"';
        i += 2;
        continue;
      }
      if(ch === '"'){
        inQuotes = false;
        i++;
        continue;
      }
      cell += ch;
      i++;
      continue;
    }

    if(ch === '"'){
      inQuotes = true;
      i++;
      continue;
    }
    if(ch === ','){
      row.push(cell);
      cell = "";
      i++;
      continue;
    }
    if(ch === '\n'){
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
      i++;
      continue;
    }
    if(ch === '\r'){
      i++;
      continue;
    }

    cell += ch;
    i++;
  }

  row.push(cell);
  rows.push(row);

  const headers = (rows.shift() || []).map(h => (h || "").trim());
  return rows
    .filter(r => r.some(v => String(v || "").trim() !== ""))
    .map(r => {
      const obj = {};
      headers.forEach((h, idx) => obj[h] = (r[idx] ?? "").trim());
      return obj;
    });
}

async function loadLectures(){
  if(!LECTURE_CSV_URL){
    LECTURES = [];
    return;
  }

  try{
    const res = await fetch(LECTURE_CSV_URL, { cache:"no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    const rows = parseCSV(text);
    LECTURES = rows.map(normalizeRow);
  }catch(err){
    console.error("講義CSVの読み込み失敗:", err);
    LECTURES = [];
  }
}

/* =========================
   フィルタUI
========================= */
function fillSelect(id, values, label){
  const el = document.getElementById(id);
  const current = el.value;
  el.innerHTML = `<option value="">${label}（すべて）</option>` +
    values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
  if(values.includes(current)) el.value = current;
}

function setupFilters(){
  const publicRows = LECTURES.filter(x => x.status !== "非公開");

  fillSelect(
    "f-year",
    uniq(publicRows.map(x => x.year)).sort((a,b) => String(b).localeCompare(String(a), "ja")),
    "年度"
  );
  fillSelect(
    "f-term",
    uniq(publicRows.map(x => x.term)),
    "学期"
  );
  fillSelect(
    "f-inst",
    uniq(publicRows.map(x => x.institution)),
    "機関"
  );
}



function getGradesByLectureId(lectureId){
  return GRADE_ROWS
    .filter(x => x.lecture_id === lectureId)
    .sort((a,b) => Number(a.sort || 999999) - Number(b.sort || 999999));
}

function getGradeTotal(grades){
  return grades.reduce((sum, g) => sum + Number(g.count || 0), 0);
}

/* =========================
   描画
========================= */
function getFilteredLectures(){
  const q = (document.getElementById("q").value || "").trim().toLowerCase();
  const fy = document.getElementById("f-year").value;
  const ft = document.getElementById("f-term").value;
  const fi = document.getElementById("f-inst").value;

  return LECTURES
    .filter(x => x.status !== "非公開")
    .filter(x => !fy || x.year === fy)
    .filter(x => !ft || x.term === ft)
    .filter(x => !fi || x.institution === fi)
    .filter(x => {
      if(!q) return true;
      const blob = [
        x.year, x.term, x.institution, x.faculty, x.title, x.subtitle,
        x.target, x.category, x.summary, x.schedule, x.room, x.note
      ].join(" ").toLowerCase();
      return blob.includes(q);
    })
    .sort((a,b) => {
      const sa = Number(a.sort || 999999);
      const sb = Number(b.sort || 999999);
      if(sa !== sb) return sa - sb;
      if(a.year !== b.year) return String(b.year).localeCompare(String(a.year), "ja");
      return a.title.localeCompare(b.title, "ja");
    });
}

function lectureCardHTML(x){
  const badges = [
    x.year && `<span class="badge primary">${escapeHtml(x.year)}</span>`,
    x.term && `<span class="badge">${escapeHtml(x.term)}</span>`,
    x.category && `<span class="badge">${escapeHtml(x.category)}</span>`
  ].filter(Boolean).join("");

  const subtitle = x.subtitle ? ` / ${escapeHtml(x.subtitle)}` : "";
  const links = [
    x.syllabus_url ? `<a class="link-btn primary" href="${escapeHtml(x.syllabus_url)}" target="_blank" rel="noopener noreferrer">シラバス</a>` : "",
    x.material_url ? `<a class="link-btn" href="${escapeHtml(x.material_url)}" target="_blank" rel="noopener noreferrer">配布資料</a>` : ""
  ].filter(Boolean).join("");

  const grades = getGradesByLectureId(x.id);
  const total = getGradeTotal(grades);
  const minSize = Number(x.min_public_size || 0);

  const canShowSummary = isTrue(x.grade_public) && !!x.grade_summary;
  const canShowDist = isTrue(x.grade_public) && grades.length > 0 && total >= minSize;

  const gradeSummaryHtml = canShowSummary
    ? `<div class="grade-summary">${escapeHtml(x.grade_summary)}</div>`
    : "";

  const gradeDistHtml = canShowDist
    ? `
      <div class="grade-dist">
        ${grades.map(g => `
          <div class="grade-row">
            <span class="grade-label">${escapeHtml(g.label)}</span>
            <span class="grade-count">${escapeHtml(g.count)}名</span>
          </div>
        `).join("")}
      </div>
    `
    : "";

  return `
    <article class="card">
      <div class="card-head">
        <div class="badges">${badges}</div>
        <h2 class="card-title">${escapeHtml(x.title)}${subtitle}</h2>
        <div class="card-meta">${escapeHtml(x.institution)}${x.faculty ? " / " + escapeHtml(x.faculty) : ""}</div>
      </div>
      <div class="card-body">
        ${x.summary ? `<div class="summary">${escapeHtml(x.summary)}</div>` : ""}
        ${gradeSummaryHtml}
        ${gradeDistHtml}
        <div class="meta-list">
          ${x.target ? `<div class="meta-row"><div class="meta-label">対象</div><div>${escapeHtml(x.target)}</div></div>` : ""}
          ${x.schedule ? `<div class="meta-row"><div class="meta-label">開講情報</div><div>${escapeHtml(x.schedule)}</div></div>` : ""}
          ${x.language ? `<div class="meta-row"><div class="meta-label">言語</div><div>${escapeHtml(x.language)}</div></div>` : ""}
          ${x.format ? `<div class="meta-row"><div class="meta-label">形式</div><div>${escapeHtml(x.format)}</div></div>` : ""}
          ${x.room ? `<div class="meta-row"><div class="meta-label">教室</div><div>${escapeHtml(x.room)}</div></div>` : ""}
          ${x.updated ? `<div class="meta-row"><div class="meta-label">更新日</div><div>${escapeHtml(x.updated)}</div></div>` : ""}
        </div>
        ${links ? `<div class="link-row">${links}</div>` : ""}
        ${x.note ? `<div class="note">${escapeHtml(x.note)}</div>` : ""}
      </div>
    </article>
  `;
}

function renderLectures(){
  const list = getFilteredLectures();
  const grid = document.getElementById("lecture-grid");
  const empty = document.getElementById("empty-box");
  const count = document.getElementById("result-count");

  count.textContent = `${list.length}件`;

  if(list.length === 0){
    grid.innerHTML = "";
    empty.style.display = "";
  }else{
    empty.style.display = "none";
    grid.innerHTML = list.map(lectureCardHTML).join("");
  }

  renderYearSummary();
}

function renderYearSummary(){
  const list = getFilteredLectures();
  const map = {};
  list.forEach(x => {
    const key = x.year || "年度未設定";
    map[key] = (map[key] || 0) + 1;
  });

  const rows = Object.entries(map)
    .sort((a,b) => String(b[0]).localeCompare(String(a[0]), "ja"))
    .map(([year, n]) => `
      <div class="side-item">
        <div class="t">${escapeHtml(year)}</div>
        <div class="s">${n}件</div>
      </div>
    `);

  document.getElementById("year-summary").innerHTML =
    rows.length ? rows.join("") : `<div class="side-item"><div class="s">表示中の講義はありません。</div></div>`;
}

function clearSearch(){
  document.getElementById("q").value = "";
  document.getElementById("f-year").value = "";
  document.getElementById("f-term").value = "";
  document.getElementById("f-inst").value = "";
  renderLectures();
}

/* =========================
   初期化
========================= */
document.addEventListener("DOMContentLoaded", async () => {
  setFooterLinks();
  await loadLectures();
  await loadGradeDistribution();
  setupFilters();
  renderLectures();
});
</script>
</body>
</html>
